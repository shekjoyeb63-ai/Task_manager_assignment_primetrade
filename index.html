<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow – Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --danger: #ff4757;
    --warn: #ffa502;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 4s; }
  .orb3 { width: 250px; height: 250px; background: var(--accent3); top: 40%; left: 60%; animation-delay: 8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ─── LAYOUT ─── */
  #app { position: relative; z-index: 1; }

  /* ─── AUTH SCREEN ─── */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }

  .brand {
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand p { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; letter-spacing: 1px; text-transform: uppercase; }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    background: var(--bg);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 0.6rem;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .role-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .role-tab {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .role-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }

  .form-group { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.5px; text-transform: uppercase; }
  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover { background: #7c75ff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,99,255,0.4); }
  .btn-danger { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
  .btn-danger:hover { background: rgba(255,71,87,0.25); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: rgba(67,233,123,0.15); color: var(--accent3); border: 1px solid rgba(67,233,123,0.3); }
  .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }

  .alert {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    display: none;
  }
  .alert.show { display: block; }
  .alert-error { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }
  .alert-success { background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); color: var(--accent3); }

  /* ─── DASHBOARD ─── */
  .dashboard { display: none; min-height: 100vh; flex-direction: column; }
  .dashboard.active { display: flex; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    animation: slideDown 0.4s ease both;
  }
  .topbar-brand {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .role-pill {
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .role-pill.employee { background: rgba(108,99,255,0.2); color: var(--accent); }
  .role-pill.admin    { background: rgba(255,101,132,0.2); color: var(--accent2); }

  .main-content { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.pending::after { background: var(--warn); }
  .stat-card.in_progress::after { background: var(--accent); }
  .stat-card.done::after { background: var(--accent3); }
  .stat-card.total::after { background: var(--accent2); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.2rem; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .section-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .section-body { padding: 1.5rem; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.2rem;
  }
  .filter-bar select { width: auto; padding: 0.5rem 0.8rem; font-size: 0.75rem; }
  .filter-bar .btn { padding: 0.5rem 1rem; }

  /* Task grid */
  .tasks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  .task-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .task-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.8rem; }
  .task-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
  .task-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.8rem; line-height: 1.5; }
  .task-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .task-actions { display: flex; gap: 0.5rem; }

  .badge {
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-pending   { background: rgba(255,165,2,0.15); color: var(--warn); }
  .badge-in_progress { background: rgba(108,99,255,0.15); color: var(--accent); }
  .badge-done      { background: rgba(67,233,123,0.15); color: var(--accent3); }
  .badge-low       { background: rgba(107,107,133,0.15); color: var(--muted); }
  .badge-medium    { background: rgba(255,165,2,0.15); color: var(--warn); }
  .badge-high      { background: rgba(255,71,87,0.15); color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 1rem;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    position: relative;
    animation: popIn 0.2s ease both;
  }
  .modal::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 16px 16px 0 0;
  }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
  .modal-actions .btn { flex: 1; }

  /* Toast */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1.2rem;
    font-size: 0.8rem;
    min-width: 220px;
    animation: slideLeft 0.3s ease;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .toast.success { border-color: rgba(67,233,123,0.4); }
  .toast.error   { border-color: rgba(255,71,87,0.4); }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes slideLeft { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes popIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

  /* Loading spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Due date */
  .due-date { font-size: 0.7rem; color: var(--muted); }
  .due-date.overdue { color: var(--danger); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div id="app">

  <!-- AUTH SCREEN -->
  <div class="auth-screen" id="authScreen">
    <div class="brand">
      <h1>TaskFlow</h1>
      <p>Task Management System</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" onclick="switchAuthTab('login')">Login</button>
        <button class="tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <div class="role-tabs">
        <button class="role-tab active" onclick="switchRole('employee')">Employee</button>
        <button class="role-tab" onclick="switchRole('admin')">Admin</button>
      </div>

      <div id="authAlert" class="alert"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="authPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') submitAuth()" />
      </div>

      <button class="btn btn-primary" onclick="submitAuth()" id="authBtn">
        <span id="authBtnText">Login</span>
      </button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <div class="topbar-brand">TaskFlow</div>
      <div class="topbar-right">
        <div class="user-badge">
          <span id="userEmail">user@email.com</span>
          <span class="role-pill" id="rolePill">employee</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="main-content">
      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card total">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-num" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card in_progress">
          <div class="stat-num" id="statProgress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card done">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">Done</div>
        </div>
      </div>

      <!-- Tasks Section -->
      <div class="section">
        <div class="section-header">
          <span class="section-title" id="sectionTitle">My Tasks</span>
          <button class="btn btn-primary btn-sm" onclick="openCreateModal()" id="createTaskBtn">+ New Task</button>
        </div>
        <div class="section-body">
          <div class="filter-bar">
            <select id="filterStatus" onchange="applyFilters()">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
            <select id="filterPriority" onchange="applyFilters()">
              <option value="">All Priorities</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
          </div>
          <div class="tasks-grid" id="tasksGrid">
            <div class="empty-state"><div class="icon">📋</div>Loading tasks…</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CREATE / EDIT MODAL -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Create Task</div>
      <div id="modalAlert" class="alert"></div>
      <input type="hidden" id="editTaskId" />
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="taskTitle" placeholder="Task title" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDesc" placeholder="Optional description…"></textarea>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group" id="statusGroup" style="display:none">
        <label>Status</label>
        <select id="taskStatus">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="taskDueDate" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitTask()" id="modalBtn">
          <span id="modalBtnText">Create</span>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://127.0.0.1:5000/api/v1"
  : "https://task-manager-production-82a3.up.railway.app/api/v1";

// ─── STATE ───
let state = {
  token: localStorage.getItem("tf_token") || null,
  role:  localStorage.getItem("tf_role")  || null,
  email: localStorage.getItem("tf_email") || null,
  currentTab: "login",
  currentRole: "employee",
};

// ─── INIT ───
window.onload = () => {
  if (state.token) showDashboard();
};

// ─── AUTH ───
function switchAuthTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
  document.getElementById('authBtnText').textContent = tab === 'login' ? 'Login' : 'Register';
  clearAlert('authAlert');
}

function switchRole(role) {
  state.currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && role==='employee') || (i===1 && role==='admin')));
  clearAlert('authAlert');
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { showAlert('authAlert', 'Please fill in all fields', 'error'); return; }

  const btn = document.getElementById('authBtn');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;

  const endpoint = state.currentTab === 'login'
    ? `/login_${state.currentRole}`
    : `/register_${state.currentRole}`;

  try {
    const res  = await fetch(BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      if (state.currentTab === 'login') {
        state.token = data.token;
        state.role  = state.currentRole;
        state.email = email;
        localStorage.setItem('tf_token', data.token);
        localStorage.setItem('tf_role',  state.currentRole);
        localStorage.setItem('tf_email', email);
        showDashboard();
        toast('Logged in successfully', 'success');
      } else {
        showAlert('authAlert', 'Registered! Now log in.', 'success');
        switchAuthTab('login');
      }
    } else {
      showAlert('authAlert', data.message || 'Something went wrong', 'error');
    }
  } catch(e) {
    showAlert('authAlert', 'Cannot connect to server. Is Flask running?', 'error');
  }

  btn.innerHTML = `<span id="authBtnText">${state.currentTab === 'login' ? 'Login' : 'Register'}</span>`;
  btn.disabled = false;
}

// ─── DASHBOARD ───
function showDashboard() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('userEmail').textContent = state.email;
  const pill = document.getElementById('rolePill');
  pill.textContent = state.role;
  pill.className = `role-pill ${state.role}`;
  document.getElementById('sectionTitle').textContent = state.role === 'admin' ? 'All Tasks' : 'My Tasks';
  document.getElementById('createTaskBtn').style.display = state.role === 'admin' ? 'none' : '';
  loadTasks();
}

// ─── TASKS ───
async function loadTasks(statusFilter='', priorityFilter='') {
  const grid = document.getElementById('tasksGrid');
  grid.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Loading…</div>';

  try {
    let url;
    if (statusFilter || priorityFilter) {
      const params = new URLSearchParams();
      if (statusFilter)   params.set('status',   statusFilter);
      if (priorityFilter) params.set('priority', priorityFilter);
      url = `${BASE}/tasks/filter?${params}`;
    } else {
      url = state.role === 'admin' ? `${BASE}/tasks` : `${BASE}/my_tasks`;
    }

    const res  = await fetch(url, { headers: { Authorization: `Bearer ${state.token}` } });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();

    const tasks = Array.isArray(data) ? data : [];
    updateStats(tasks);
    renderTasks(tasks);
  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Error loading tasks</div>';
  }
}

function updateStats(tasks) {
  document.getElementById('statTotal').textContent    = tasks.length;
  document.getElementById('statPending').textContent  = tasks.filter(t=>t.status==='pending').length;
  document.getElementById('statProgress').textContent = tasks.filter(t=>t.status==='in_progress').length;
  document.getElementById('statDone').textContent     = tasks.filter(t=>t.status==='done').length;
}

function renderTasks(tasks) {
  const grid = document.getElementById('tasksGrid');
  if (!tasks.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🎉</div>No tasks found</div>';
    return;
  }
  grid.innerHTML = tasks.map(t => taskCard(t)).join('');
}

function taskCard(t) {
  const isOverdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done';
  return `
  <div class="task-card" id="task-${t.id}">
    <div class="task-card-top">
      <div class="task-title">${escHtml(t.title)}</div>
      <span class="badge badge-${t.priority}">${t.priority}</span>
    </div>
    ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
    <div class="task-meta">
      <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
      ${t.due_date ? `<span class="due-date ${isOverdue?'overdue':''}">📅 ${t.due_date}</span>` : ''}
    </div>
    <div class="task-actions">
      <button class="btn btn-ghost btn-sm" onclick="openEditModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete</button>
    </div>
  </div>`;
}

// ─── FILTERS ───
function applyFilters() {
  const s = document.getElementById('filterStatus').value;
  const p = document.getElementById('filterPriority').value;
  loadTasks(s, p);
}
function clearFilters() {
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterPriority').value = '';
  loadTasks();
}

// ─── CREATE / EDIT MODAL ───
function openCreateModal() {
  document.getElementById('modalTitle').textContent = 'Create Task';
  document.getElementById('modalBtnText').textContent = 'Create';
  document.getElementById('editTaskId').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('taskDueDate').value = '';
  document.getElementById('statusGroup').style.display = 'none';
  clearAlert('modalAlert');
  document.getElementById('taskModal').classList.add('active');
}

function openEditModal(task) {
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('modalBtnText').textContent = 'Save';
  document.getElementById('editTaskId').value = task.id;
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.description || '';
  document.getElementById('taskPriority').value = task.priority;
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskDueDate').value = task.due_date || '';
  document.getElementById('statusGroup').style.display = '';
  clearAlert('modalAlert');
  document.getElementById('taskModal').classList.add('active');
}

function closeModal() {
  document.getElementById('taskModal').classList.remove('active');
}

async function submitTask() {
  const taskId = document.getElementById('editTaskId').value;
  const isEdit = !!taskId;
  const title    = document.getElementById('taskTitle').value.trim();
  const desc     = document.getElementById('taskDesc').value.trim();
  const priority = document.getElementById('taskPriority').value;
  const status   = document.getElementById('taskStatus').value;
  const dueDate  = document.getElementById('taskDueDate').value;

  if (!title) { showAlert('modalAlert','Title is required','error'); return; }

  const btn = document.getElementById('modalBtn');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;

  const body = { title, priority };
  if (desc)    body.description = desc;
  if (dueDate) body.due_date    = dueDate;
  if (isEdit && status) body.status = status;

  try {
    const res = await fetch(
      isEdit ? `${BASE}/tasks/${taskId}` : `${BASE}/tasks`,
      {
        method: isEdit ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
        body: JSON.stringify(body)
      }
    );
    const data = await res.json();
    if (res.ok) {
      closeModal();
      toast(isEdit ? 'Task updated!' : 'Task created!', 'success');
      loadTasks();
    } else {
      const msg = data.errors ? data.errors.join(', ') : data.message;
      showAlert('modalAlert', msg, 'error');
    }
  } catch(e) {
    showAlert('modalAlert','Network error','error');
  }

  btn.innerHTML = `<span id="modalBtnText">${isEdit?'Save':'Create'}</span>`;
  btn.disabled = false;
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    const res = await fetch(`${BASE}/tasks/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${state.token}` }
    });
    if (res.ok) { toast('Task deleted', 'success'); loadTasks(); }
    else { const d = await res.json(); toast(d.message,'error'); }
  } catch(e) { toast('Network error','error'); }
}

// ─── LOGOUT ───
async function logout() {
  try {
    await fetch(`${BASE}/logout`, { method:'POST', headers:{ Authorization:`Bearer ${state.token}` } });
  } catch(e) {}
  doLogout();
}
function doLogout() {
  localStorage.removeItem('tf_token');
  localStorage.removeItem('tf_role');
  localStorage.removeItem('tf_email');
  state.token = null; state.role = null; state.email = null;
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('authScreen').style.display = '';
  toast('Logged out', 'success');
}

// ─── HELPERS ───
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert alert-${type} show`;
}
function clearAlert(id) {
  const el = document.getElementById(id);
  el.className = 'alert';
  el.textContent = '';
}
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':'✗'}</span> ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.getElementById('taskModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
